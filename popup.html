<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; padding: 12px; width: 300px;">

<h3 style="margin-bottom: 6px;">Block Elements</h3>
<textarea id="block" 
  style="width: 100%; height: 80px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 12px;">
</textarea>

<h3 style="margin-bottom: 6px;">Custom CSS</h3>
<textarea id="css" 
  style="width: 100%; height: 80px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 12px;">
</textarea>

<button id="save" 
  style="width: 100%; padding: 8px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">
  Save
</button>

<script src="popup.js"></script>
</body>
</html>
